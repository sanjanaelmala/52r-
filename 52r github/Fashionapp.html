<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion App</title>


  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .favorite {
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>
<body>
    <!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark p-3">
  <div class="container-fluid">
    <a class="navbar-brand">Fashion App</a>
    <input id="search" class="form-control w-50" type="search" placeholder="Search products...">
  </div>
</nav>

<!-- ================= FILTERS ================= -->
<div class="container mt-4">
  <div class="row mb-3">

    <!-- Category Filter -->
    <div class="col-md-3">
      <select id="category" class="form-select">
        <option value="">All Categories</option>
        <option value="men">Men</option>
        <option value="women">Women</option>
      </select>
    </div>

    <!-- Price Filter -->
    <div class="col-md-3">
      <select id="price" class="form-select">
        <option value="">All Prices</option>
        <option value="low">Below 1000</option>
        <option value="high">Above 1000</option>
      </select>
    </div>

  </div>

  <!-- Products -->
  <div id="products" class="row"></div>
</div>

<script>

// ================= VARIABLES =================
const API_URL = "https://fakestoreapi.com/products";
let allProducts = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

// ================= FETCH DATA =================
async function fetchProducts() {
  const res = await fetch(API_URL);
  const data = await res.json();

  allProducts = data;
  displayProducts(data);
}

// ================= DISPLAY PRODUCTS =================
function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(product => {

    const isFav = favorites.includes(product.id);

    container.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card p-3">

          <img src="${product.image}" height="200" style="object-fit:contain">

          <h5>${product.title}</h5>
          <p>₹ ${product.price}</p>

          <span class="favorite" onclick="toggleFavorite(${product.id})">
            ${isFav ? '❤️' : '🤍'}
          </span>

        </div>
      </div>
    `;
  });
}

// ================= FAVORITES =================
function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  displayProducts(allProducts);
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.title.toLowerCase().includes(value)
  );

  displayProducts(filtered);
});

// ================= PRICE FILTER =================
document.getElementById("price").addEventListener("change", (e) => {
  let filtered = [...allProducts];

  if (e.target.value === "low") {
    filtered = filtered.filter(p => p.price < 1000);
  }

  if (e.target.value === "high") {
    filtered = filtered.filter(p => p.price >= 1000);
  }

  displayProducts(filtered);
});

// ================= CATEGORY FILTER (BEGINNER FIX) =================
document.getElementById("category").addEventListener("change", (e) => {
  let filtered = [...allProducts];

  if (e.target.value === "men") {
    filtered = filtered.filter(p => p.category.includes("men"));
  }

  if (e.target.value === "women") {
    filtered = filtered.filter(p => p.category.includes("women"));
  }

  displayProducts(filtered);
});

// ================= START =================
fetchProducts();

</script>
</body>
</html>
