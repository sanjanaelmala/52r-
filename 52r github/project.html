<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
  <title>Fashion App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }

    .card { margin: 10px; padding: 10px; }

    .favorite {
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark p-3">
  <h3 class="text-white">Fashion App</h3>

  <!-- Search -->
  <input id="search" class="form-control w-50" placeholder="Search...">
</nav>

<div class="container mt-4">

  <!-- ================= FILTER ================= -->
  <select id="priceFilter" class="form-select mb-3">
    <option value="">All Prices</option>
    <option value="low">Below 1000</option>
    <option value="high">Above 1000</option>
  </select>

  <!-- ================= STYLING TIPS ================= -->
  <div class="alert alert-info">
    💡 Tip: Pair light colors with denim for a stylish look!
  </div>

  <!-- ================= PRODUCTS ================= -->
  <div id="products" class="row"></div>

  <!-- ================= FAVORITES ================= -->
  <h4>❤️ Favorites</h4>
  <div id="favorites" class="row"></div>

</div>

<script>

// ================= STEP 1: VARIABLES =================
let allProducts = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

// ================= STEP 2: FETCH DATA =================
async function fetchProducts() {
  const res = await fetch("https://fakestoreapi.com/products");
  const data = await res.json();

  allProducts = data;

  displayProducts(data);
  displayFavorites();
}

// ================= STEP 3: DISPLAY PRODUCTS =================
function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {

    const isFav = favorites.includes(p.id);

    container.innerHTML += `
      <div class="col-md-4">
        <div class="card">

          <img src="${p.image}" height="150">

          <h5>${p.title}</h5>
          <p>₹${p.price}</p>

          <!-- Favorite Button -->
          <span class="favorite" onclick="toggleFavorite(${p.id})">
            ${isFav ? '❤️' : '🤍'}
          </span>

        </div>
      </div>
    `;
  });
}

// ================= STEP 4: SEARCH =================
document.getElementById("search").addEventListener("input", function(e) {

  const text = e.target.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.title.toLowerCase().includes(text)
  );

  displayProducts(filtered);
});

// ================= STEP 5: FILTER =================
document.getElementById("priceFilter").addEventListener("change", function(e) {

  let filtered = [...allProducts];

  if (e.target.value === "low") {
    filtered = filtered.filter(p => p.price < 1000);
  }

  if (e.target.value === "high") {
    filtered = filtered.filter(p => p.price >= 1000);
  }

  displayProducts(filtered);
});

// ================= STEP 6: FAVORITES =================
function toggleFavorite(id) {

  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));

  displayProducts(allProducts);
  displayFavorites();
}

// ================= STEP 7: SHOW FAVORITES =================
function displayFavorites() {
  const container = document.getElementById("favorites");
  container.innerHTML = "";

  const favItems = allProducts.filter(p => favorites.includes(p.id));

  favItems.forEach(p => {
    container.innerHTML += `
      <div class="col-md-3">
        <div class="card">
          <p>${p.title}</p>
        </div>
      </div>
    `;
  });
}

// ================= STEP 8: START APP =================
fetchProducts();

</script>

</body>
</html>
